# Builds a Windows silver_kb.exe on demand (no release needed), so it
# can be downloaded and tested on a real Windows machine:
#   gh workflow run build-windows.yml
#   gh run download <run-id>
name: build-windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: build
        run: cargo build --release
      - name: upload the exe
        uses: actions/upload-artifact@v4
        with:
          name: silver_kb-windows
          path: target/release/silver_kb.exe
